<script>
const SUPA_URL='https://sbvxiizvwyikjajjdsjs.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidnhpaXp2d3lpa2phampkc2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODA1ODAsImV4cCI6MjA5NTM1NjU4MH0.pzvDazQj7xnZ_1OmucVvghtvNfZtofLxJKVw4JlS3m0';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

var currentUser=null,currentWalkId=null,isDirty=false;
var photos=[],plans=[],parsedData=null,questionAnswers={};

// ── CORE LOGIC ────────────────────────────────────────────────
async function checkSession(){var s=await sb.auth.getSession();if(s.data.session){currentUser=s.data.session.user;showApp();}}
async function showApp(){document.getElementById('auth-wrap').style.display='none';document.getElementById('app').style.display='block';loadWalks();}

// Auto-save & Dirty tracking
function markDirty(){isDirty=true;}
async function autoSave(){
  if(!currentWalkId||!isDirty)return;
  var data=buildWalkRecord('draft');
  await sb.from('site_walks').update(data).eq('id',currentWalkId);
  isDirty=false;
  showToast('Saved');
}

// Navigation Guard
window.onbeforeunload = function(){if(isDirty) return "You have unsaved changes!";};

// ── DASHBOARD ─────────────────────────────────────────────────
async function loadWalks(){
  var el=document.getElementById('walks-list');
  el.innerHTML='<div class="loading-wrap"><div class="spinner"></div>Loading...</div>';
  var r=await sb.from('site_walks').select('*').order('updated_at',{ascending:false});
  if(r.error||!r.data.length){el.innerHTML='<div class="empty-dash">No site walks found.</div>';return;}
  el.innerHTML=r.data.map(w=>`
    <div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div onclick="openWalk('${w.id}')" style="flex:1;cursor:pointer">
        <div style="font-weight:700">${w.client||'Untitled'}</div>
        <div style="font-size:12px;color:var(--muted)">${w.address||'No location'}</div>
      </div>
      <button onclick="deleteWalk('${w.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;padding:10px">Delete</button>
    </div>
  `).join('');
}

async function deleteWalk(id){
  if(!confirm('Delete this walk permanently?')) return;
  await sb.from('site_walks').delete().eq('id',id);
  loadWalks();
}

async function startExpress(){
  isDirty=false; photos=[]; plans=[]; currentWalkId=null;
  var r=await sb.from('site_walks').insert({created_by:currentUser.id,status:'draft'}).select().single();
  currentWalkId=r.data.id;
  goScreen(1);
}

// ── PHOTO/PLAN HANDLING ───────────────────────────────────────
// Using a standard input with capture="environment" on mobile triggers the native OS Choice Menu (Camera vs Library)
function handlePhotos(e){
  Array.from(e.target.files).forEach(f=>{
    var r=new FileReader();
    r.onload=ev=>{photos.push({data:ev.target.result});renderPhotoStrip();markDirty();};
    r.readAsDataURL(f);
  });
}

function renderPhotoStrip(){
  document.getElementById('photo-strip-2').innerHTML=photos.map((p,i)=>`
    <div class="pthumb-wrap"><img src="${p.data}" class="pthumb"><button class="pdel" onclick="photos.splice(${i},1);renderPhotoStrip();markDirty();">&times;</button></div>
  `).join('');
}

// ── AI PROCESSING ─────────────────────────────────────────────
async function processEverything(){
  await autoSave();
  goScreen(3);
  // ... (Keep existing AI fetch logic here) ...
}

// ── NAVIGATION ────────────────────────────────────────────────
function goScreen(n){
  if(isDirty) autoSave();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(n==='dash'){
    document.getElementById('screen-dash').classList.add('active');
    loadWalks();
  } else {
    document.getElementById('screen-'+n).classList.add('active');
  }
}

// ── HELPERS ───────────────────────────────────────────────────
function buildWalkRecord(status){
  return {
    client:document.getElementById('e-client').value,
    address:document.getElementById('e-location').value,
    notes:document.getElementById('e-notes').value,
    status:status,
    updated_at:new Date().toISOString()
  };
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Add blur listeners to all inputs to trigger autoSave
document.querySelectorAll('input, textarea').forEach(el=>el.addEventListener('blur', markDirty));

checkSession();
</script>
