<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GHE Master Site Walk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a5c3a;--green-dark:#154d31;--green-light:#e8f2ec;--warn:#92400e;--warn-bg:#fef3c7;--warn-border:#fcd34d;--danger:#991b1b;--danger-bg:#fef2f2;--danger-border:#fca5a5;--border:#e5e7eb;--bg:#f3f4f6;--surface:#fff;--text:#111827;--muted:#6b7280;--subtle:#9ca3af;--radius:12px;--radius-sm:8px;font-family:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.app{display:none}
.app-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.screen{display:none;padding:16px;max-width:600px;margin:0 auto}
.screen.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.btn-primary{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;cursor:pointer}
.pthumb-wrap{position:relative;display:inline-block;margin:4px}
.pthumb{width:70px;height:70px;object-fit:cover;border-radius:var(--radius-sm)}
.pdel{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:99px;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div style="font-size:22px;font-weight:700;color:var(--green);text-align:center">GHE SITE WALK</div>
    <div style="margin-top:20px">
      <input type="email" id="login-email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid var(--border)">
      <input type="password" id="login-pass" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid var(--border)">
      <button class="btn-primary" onclick="signIn()">Sign in</button>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="app-bar">
    <div style="font-weight:700;color:var(--green)">GHE Site Walk</div>
    <button onclick="signOut()" style="padding:5px 10px;cursor:pointer">Sign out</button>
  </div>

  <div class="screen active" id="screen-dash">
    <button class="btn-primary" onclick="startExpress()">+ New Walk</button>
    <div id="walks-list" style="margin-top:20px"></div>
  </div>

  <div class="screen" id="screen-1">
    <div class="card">
      <input type="text" id="e-client" placeholder="Client Name" style="width:100%;padding:10px;margin-bottom:10px">
      <input type="text" id="e-location" placeholder="Location" style="width:100%;padding:10px;margin-bottom:10px">
      <textarea id="e-notes" placeholder="Notes..." style="width:100%;height:100px;padding:10px"></textarea>
      <input type="file" id="photo-input" accept="image/*" multiple capture="environment" onchange="handlePhotos(event)" style="margin-top:10px">
      <div id="photo-strip-2"></div>
    </div>
    <button class="btn-primary" onclick="goScreen('dash')">Save & Dashboard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient('https://sbvxiizvwyikjajjdsjs.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidnhpaXp2d3lpa2phampkc2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODA1ODAsImV4cCI6MjA5NTM1NjU4MH0.pzvDazQj7xnZ_1OmucVvghtvNfZtofLxJKVw4JlS3m0');

let currentUser = null, currentWalkId = null, isDirty = false;

// ── APP FLOW ──────────────────────────────────────────────
async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    currentUser = data.session.user;
    document.getElementById('auth-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadWalks();
  }
}

async function signIn() {
  await sb.auth.signInWithPassword({email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value});
  location.reload();
}

async function signOut() { await sb.auth.signOut(); location.reload(); }

// ── DASHBOARD & DELETION ──────────────────────────────────
async function loadWalks() {
  const { data } = await sb.from('site_walks').select('*').order('updated_at', {ascending: false});
  document.getElementById('walks-list').innerHTML = (data||[]).map(w => `
    <div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div onclick="openWalk('${w.id}')" style="cursor:pointer;flex:1"><b>${w.client||'Untitled'}</b></div>
      <button onclick="deleteWalk('${w.id}')" style="color:red;background:none;border:none;padding:5px">Delete</button>
    </div>
  `).join('');
}

async function deleteWalk(id) {
  if(!confirm('Permanently delete?')) return;
  await sb.from('site_walks').delete().eq('id', id);
  loadWalks();
}

// ── EDITOR & AUTO-SAVE ────────────────────────────────────
async function startExpress() {
  const { data } = await sb.from('site_walks').insert({created_by: currentUser.id, status:'draft'}).select().single();
  currentWalkId = data.id;
  goScreen('1');
}

async function openWalk(id) {
  currentWalkId = id;
  const { data } = await sb.from('site_walks').select('*').eq('id', id).single();
  document.getElementById('e-client').value = data.client || '';
  document.getElementById('e-location').value = data.address || '';
  document.getElementById('e-notes').value = data.notes || '';
  goScreen('1');
}

function markDirty() { isDirty = true; }

async function autoSave() {
  if (!currentWalkId || !isDirty) return;
  await sb.from('site_walks').update({
    client: document.getElementById('e-client').value,
    address: document.getElementById('e-location').value,
    notes: document.getElementById('e-notes').value,
    updated_at: new Date().toISOString()
  }).eq('id', currentWalkId);
  isDirty = false;
  showToast('Saved');
}

// ── PHOTO HANDLING ────────────────────────────────────────
function handlePhotos(e) {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => {
      const s = document.getElementById('photo-strip-2');
      s.innerHTML += `<div class="pthumb-wrap"><img src="${ev.target.result}" class="pthumb"><button class="pdel" onclick="this.parentElement.remove();markDirty()">&times;</button></div>`;
      markDirty();
    };
    r.readAsDataURL(f);
  });
}

// ── NAVIGATION & HELPERS ──────────────────────────────────
window.onbeforeunload = () => { if(isDirty) return "Unsaved changes!"; };

function goScreen(id) {
  if (isDirty) autoSave();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('blur', (e) => { 
    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) markDirty(); 
}, true);

checkSession();
</script>
</body>
</html>
