<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GHE Master Site Walk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');
:root{--green:#1a5c3a;--bg:#f3f4f6;--danger:#991b1b;--border:#e5e7eb;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',sans-serif}
body{background:var(--bg);padding-bottom:60px}
.app{display:none}
.app-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.nav-tabs{display:flex;gap:10px;margin-bottom:16px;padding:0 16px}
.tab{padding:8px 16px;background:#fff;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:700}
.tab.active{background:var(--green);color:#fff;border-color:var(--green)}
.screen{display:none;padding:16px;max-width:600px;margin:0 auto}
.screen.active{display:block}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn-primary{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.pthumb-wrap{position:relative;display:inline-block;margin:4px}
.pthumb{width:70px;height:70px;object-fit:cover;border-radius:8px}
.pdel{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#fee2e2;color:var(--danger);border:none;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:99px;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="auth-wrap" id="auth-wrap" style="display:flex;height:100vh;align-items:center;justify-content:center">
  <div class="card" style="width:320px">
    <div style="font-weight:700;color:var(--green);text-align:center;margin-bottom:20px">GHE SITE WALK</div>
    <input type="email" id="login-email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px">
    <input type="password" id="login-pass" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px">
    <button class="btn-primary" onclick="signIn()">Sign in</button>
  </div>
</div>

<div class="app" id="app">
  <div class="app-bar">
    <div style="font-weight:700;color:var(--green)">GHE Workspace</div>
    <button onclick="signOut()">Sign out</button>
  </div>
  
  <div class="nav-tabs">
    <div class="tab active" id="tab-express" onclick="switchMode('express')">Express</div>
    <div class="tab" id="tab-guided" onclick="switchMode('guided')">Guided</div>
  </div>

  <div class="screen active" id="screen-dash">
    <button class="btn-primary" onclick="startExpress()">+ New Walk</button>
    <div id="walks-list" style="margin-top:20px"></div>
  </div>

  <div class="screen" id="screen-editor">
    <div class="card">
      <input type="text" id="e-client" placeholder="Client Name" style="width:100%;padding:10px;margin-bottom:10px">
      <textarea id="e-notes" placeholder="Site notes..." style="width:100%;height:100px;padding:10px"></textarea>
      <input type="file" id="photo-input" accept="image/*" multiple capture="environment" onchange="handlePhotos(event)" style="margin-top:10px">
      <div id="photo-strip-2"></div>
    </div>
    <button class="btn-primary" onclick="goScreen('dash')">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient('https://sbvxiizvwyikjajjdsjs.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNidnhpaXp2d3lpa2phampkc2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODA1ODAsImV4cCI6MjA5NTM1NjU4MH0.pzvDazQj7xnZ_1OmucVvghtvNfZtofLxJKVw4JlS3m0');
let currentWalkId = null, isDirty = false;

async function checkSession() {
  const { data } = await sb.auth.getSession();
  if (data.session) {
    document.getElementById('auth-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadWalks();
  }
}

async function signIn() {
  await sb.auth.signInWithPassword({email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value});
  location.reload();
}

async function signOut() { await sb.auth.signOut(); location.reload(); }

async function loadWalks() {
  const { data } = await sb.from('site_walks').select('*').order('updated_at', {ascending: false});
  document.getElementById('walks-list').innerHTML = (data||[]).map(w => `
    <div class="card" style="display:flex;justify-content:space-between">
      <div onclick="openWalk('${w.id}')" style="cursor:pointer"><b>${w.client||'Untitled'}</b></div>
      <button onclick="deleteWalk('${w.id}')" style="color:red;background:none;border:none">Delete</button>
    </div>
  `).join('');
}

async function startExpress() {
  const { data } = await sb.from('site_walks').insert({created_by: (await sb.auth.getUser()).data.user.id, status:'draft'}).select().single();
  currentWalkId = data.id;
  goScreen('editor');
}

async function openWalk(id) {
  currentWalkId = id;
  const { data } = await sb.from('site_walks').select('*').eq('id', id).single();
  document.getElementById('e-client').value = data.client || '';
  document.getElementById('e-notes').value = data.notes || '';
  goScreen('editor');
}

async function deleteWalk(id) {
  if(!confirm('Delete walk?')) return;
  await sb.from('site_walks').delete().eq('id', id);
  loadWalks();
}

function handlePhotos(e) {
  Array.from(e.target.files).forEach(f => {
    const r = new FileReader();
    r.onload = ev => {
      const s = document.getElementById('photo-strip-2');
      s.innerHTML += `<div class="pthumb-wrap"><img src="${ev.target.result}" class="pthumb"><button class="pdel" onclick="this.parentElement.remove();markDirty()">&times;</button></div>`;
      markDirty();
    };
    r.readAsDataURL(f);
  });
}

function markDirty() { isDirty = true; }

async function autoSave() {
  if (!currentWalkId || !isDirty) return;
  await sb.from('site_walks').update({
    client: document.getElementById('e-client').value,
    notes: document.getElementById('e-notes').value,
    updated_at: new Date().toISOString()
  }).eq('id', currentWalkId);
  isDirty = false;
  showToast('Saved');
}

function switchMode(mode) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+mode).classList.add('active');
  showToast('Switched to ' + mode + ' mode');
}

function goScreen(id) {
  if (isDirty) autoSave();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.addEventListener('blur', (e) => { if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) markDirty(); }, true);
window.onbeforeunload = () => { if(isDirty) return "Unsaved changes!"; };
checkSession();
</script>
</body>
</html>
