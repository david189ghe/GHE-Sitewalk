<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GHE Express Site Walk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght=0,400;0,500;0,600;0,700;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a5c3a;--green-dark:#154d31;--green-light:#e8f2ec;
  --warn:#92400e;--warn-bg:#fef3c7;--warn-border:#fcd34d;
  --danger:#991b1b;--danger-bg:#fef2f2;--danger-border:#fca5a5;
  --border:#e5e7eb;--bg:#f3f4f6;--surface:#fff;
  --text:#111827;--muted:#6b7280;--subtle:#9ca3af;
  --radius:12px;--radius-sm:8px;
  font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.auth-logo-wrap{text-align:center;margin-bottom:20px}
.auth-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.auth-err{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:12px;display:none}
.auth-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
.auth-btn:hover{background:var(--green-dark)}
.auth-switch{font-size:13px;color:var(--muted);text-align:center;margin-top:14px}
.auth-switch a{color:var(--green);cursor:pointer;font-weight:500}

/* APP */
.app{display:none}
.app-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.app-bar-left{display:flex;align-items:center;gap:10px}
.app-bar-name{font-size:14px;font-weight:700;color:var(--green)}
.app-bar-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--green-light);color:var(--green)}
.app-bar-right{display:flex;align-items:center;gap:8px}
.user-badge{font-size:12px;color:var(--muted);font-weight:500}
.signout-btn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer}
.signout-btn:hover{border-color:var(--danger);color:var(--danger)}
.guided-link{padding:6px 12px;border:1px solid var(--green);border-radius:var(--radius-sm);background:transparent;color:var(--green);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px}
.guided-link:hover{background:var(--green-light)}

/* SCREENS */
.screen{display:none;padding:16px;max-width:600px;margin:0 auto}
.screen.active{display:block}

/* PROGRESS */
.prog-wrap{display:flex;gap:4px;margin-bottom:16px;padding:0 16px;max-width:600px;margin-left:auto;margin-right:auto}
.prog-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.prog-dot.done{background:var(--green)}
.prog-dot.active{background:var(--green);opacity:.5}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;}
.sec-head{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 7px}
.fl{margin-bottom:12px}
.fl:last-child{margin-bottom:0}
.fl label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=date],input[type=email],input[type=password],select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
textarea{resize:vertical;line-height:1.6}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PHOTO DROP */
.photo-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);margin-bottom:8px}
.photo-drop:hover,.photo-drop.dragover{border-color:var(--green);background:var(--green-light)}
.photo-drop-icon{width:32px;height:32px;stroke:var(--subtle);fill:none;stroke-width:1.5;margin:0 auto 8px}
.photo-drop-text{font-size:14px;color:var(--muted);font-weight:500;margin-bottom:4px}
.photo-drop-sub{font-size:12px;color:var(--subtle)}
.photo-strip{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pthumb-wrap{position:relative}
.pthumb{width:70px;height:70px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border)}
.pdel{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1}

/* PLAN DROP */
.plan-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.plan-drop:hover{border-color:var(--green);background:var(--green-light)}
.plan-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--green-light);border-radius:var(--radius-sm);margin-top:6px;font-size:13px}
.plan-item-name{flex:1;color:var(--green);font-weight:500}
